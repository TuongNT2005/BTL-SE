<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Form Nhập Kho</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        * {
            box-sizing: border-box;
        }

        input,
        select {
            width: 100%;
            max-width: 480px;
            padding: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            background: #1d4ed8;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 0.375rem;
        }

        .secondary {
            background: #64748b;
        }

        .danger {
            background: #dc2626;
        }

        .error {
            color: #d93025;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th,
        td {
            border: 1px solid #e2e8f0;
            padding: 0.5rem;
            text-align: left;
        }

        #detailTable input {
            max-width: none;
        }

        .action-cell {
            text-align: center;
            white-space: nowrap;
        }

        .success {
            color: #166534;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <h2>Tạo phiếu nhập kho</h2>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form th:action="@{/kho/nhap-kho}" th:object="${nhapKhoRequest}" method="post">
        <div class="form-group">
            <label for="maNcc">Nhà cung cấp</label>
            <select id="maNcc" th:field="*{maNcc}" required>
                <option value="">Chọn NCC</option>
                <option th:each="ncc : ${listNCC}" th:value="${ncc.maNcc}" th:text="${ncc.ten}">
                </option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('maNcc')}" th:errors="*{maNcc}"></p>
        </div>

        <div class="form-group">
            <label for="maNhanVien">Mã nhân viên lập phiếu</label>
            <input type="number" id="maNhanVien" th:field="*{maNhanVien}" min="1" required />
            <p class="error" th:if="${#fields.hasErrors('maNhanVien')}" th:errors="*{maNhanVien}"></p>
        </div>

        <h3>Chi tiết</h3>
        <p class="error" th:if="${#fields.hasErrors('chiTietPhieuNhaps')}" th:errors="*{chiTietPhieuNhaps}"></p>
        <template id="taiLieuOptionsTemplate">
            <option value="">Chọn tài liệu</option>
            <option th:each="tl : ${listTaiLieu}" th:value="${tl.maTaiLieu}"
                th:text="${tl.tenTl + ' (Mã: ' + tl.maTaiLieu + ')'}">
            </option>
        </template>

        <table id="detailTable">
            <thead>
                <tr>
                    <th style="width: 35%;">Mã tài liệu</th>
                    <th style="width: 20%;">Số lượng</th>
                    <th style="width: 20%;">Đơn giá</th>
                    <th style="width: 25%;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="detailBody">
                <tr th:each="ct, stat : *{chiTietPhieuNhaps}" class="detail-row">
                    <td>
                        <select th:field="*{chiTietPhieuNhaps[__${stat.index}__].maTaiLieu}" required>
                            <option value="">Chọn tài liệu</option>
                            <option th:each="tl : ${listTaiLieu}" th:value="${tl.maTaiLieu}"
                                th:text="${tl.tenTl + ' (Mã: ' + tl.maTaiLieu + ')'}">
                            </option>
                        </select>
                    </td>
                    <td>
                        <input type="number" th:field="*{chiTietPhieuNhaps[__${stat.index}__].soLuong}" min="1" step="1"
                            required />
                    </td>
                    <td>
                        <input type="number" th:field="*{chiTietPhieuNhaps[__${stat.index}__].donGia}" min="1" step="1"
                            required />
                    </td>
                    <td class="action-cell">
                        <button type="button" class="danger" onclick="removeDetailRow(this)">Xóa</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <button type="button" class="secondary" onclick="addDetailRow()">Thêm tài liệu</button>

        <div style="margin-top: 1.5rem;">
            <button type="submit">Lưu phiếu nhập</button>
        </div>
    </form>
    <p><a th:href="@{/nhanvien}">Quay lại trang nhân viên</a></p>
    <script>
        function updateDetailRowIndexes() {
            const rows = document.querySelectorAll('#detailBody .detail-row');

            rows.forEach((row, index) => {
                row.querySelectorAll('input, select').forEach((field) => {
                    if (field.name.includes('.maTaiLieu')) {
                        field.name = `chiTietPhieuNhaps[${index}].maTaiLieu`;
                    } else if (field.name.includes('.soLuong')) {
                        field.name = `chiTietPhieuNhaps[${index}].soLuong`;
                    } else if (field.name.includes('.donGia')) {
                        field.name = `chiTietPhieuNhaps[${index}].donGia`;
                    }
                });
            });
        }

        function removeDetailRow(button) {
            const row = button.closest('tr');
            row.remove();
            updateDetailRowIndexes();
        }

        function addDetailRow() {
            const tbody = document.getElementById('detailBody');
            const index = tbody.querySelectorAll('.detail-row').length;

            const tr = document.createElement('tr');
            tr.className = 'detail-row';

            tr.innerHTML = `
            <td>
                <select required name="chiTietPhieuNhaps[${index}].maTaiLieu">
                    ${document.getElementById('taiLieuOptionsTemplate').innerHTML}
                </select>
            </td>
            <td>
                <input type="number" min="1" step="1" required
                       name="chiTietPhieuNhaps[${index}].soLuong" />
            </td>
            <td>
                <input type="number" min="1" step="1" required
                       name="chiTietPhieuNhaps[${index}].donGia" />
            </td>
            <td class="action-cell">
                <button type="button" class="danger" onclick="removeDetailRow(this)">Xóa</button>
            </td>
        `;

            tbody.appendChild(tr);
        }
    </script>
</body>

</html>
