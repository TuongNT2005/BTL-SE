<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật Nhà Xuất Bản' : 'Thêm mới Nhà Xuất Bản'"></title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        .form-group {margin-bottom: 1rem;}
        label {display: block; margin-bottom: 0.5rem;}
        input, textarea {width: 100%; padding: 0.5rem;}
        button {padding: 0.5rem 1rem; background:#28a745; color:#fff; border:none;}
    </style>
</head>
<body>
<h2 th:text="${isEdit} ? 'Cập nhật Nhà Xuất Bản' : 'Thêm mới Nhà Xuất Bản'"></h2>
<form th:action="${isEdit} ? @{/NXB/update/{id}(id=${NXB.maNxb})} : @{/NXB}" th:object="${NXB}" method="post">
    <input type="hidden" th:field="*{maNxb}"/>
    <div class="form-group">
        <label for="ten">Tên</label>
        <input type="text" id="ten" th:field="*{ten}" required/>
    </div>
    <div class="form-group">
        <label for="diaChi">Địa chỉ</label>
        <textarea id="diaChi" th:field="*{diaChi}" rows="4"></textarea>
    </div>
    <div class="form-group">
        <label for="sdt">Số điện thoại</label>
        <input type="text" id="sdt" th:field="*{sdt}" required/>
    </div>
    <button type="submit" th:text="${isEdit} ? 'Cập nhật' : 'Lưu'"></button>
</form>
<a th:href="@{/NXB}">Quay lại danh sách</a>
</body>
</html>
