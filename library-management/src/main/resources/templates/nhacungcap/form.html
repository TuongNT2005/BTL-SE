<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật Nhà Cung Cấp' : 'Thêm mới Nhà Cung Cấp'">Thêm mới Nhà Cung Cấp</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        .form-group {margin-bottom: 1rem;}
        label {display: block; margin-bottom: 0.5rem;}
        input, textarea {width: 100%; padding: 0.5rem;}
        button {padding: 0.5rem 1rem; background:#28a745; color:#fff; border:none;}
    </style>
</head>
<body>
<h2 th:text="${isEdit} ? 'Cập nhật Nhà Cung Cấp' : 'Thêm mới Nhà Cung Cấp'"></h2>
<form th:action="${isEdit} ? @{/nhacungcap/update/{id}(id=${nhaCungCap.maNcc})} : @{/nhacungcap}" th:object="${nhaCungCap}" method="post">
    <input type="hidden" th:field="*{maNcc}"/>
    <div class="form-group">
        <label for="ten">Tên</label>
        <input type="text" id="ten" th:field="*{ten}" required/>
    </div>
    <div class="form-group">
        <label for="diaChi">Địa chỉ</label>
        <textarea id="diaChi" th:field="*{diaChi}" rows="4"></textarea>
    </div>
    <div class="form-group">
        <label for="sdt">Số điện thoại</label>
        <input type="text" id="sdt" th:field="*{sdt}"/>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}"/>
    </div>
    <button type="submit" th:text="${isEdit} ? 'Cập nhật' : 'Lưu'"></button>
</form>
<p><a th:href="@{/nhacungcap}">Quay lại danh sách</a></p>
<p><a th:href="@{/quanly}">Quay lại trang quản lý</a></p>
</body>
</html>
